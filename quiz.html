    // ─── QUIZ DATA ───
    const QUIZ = [
      {
        label: "The Immediate Fire",
        question: "What would give you the most relief right now?",
        options: [
          { text: "Mental Bandwidth", sub: "Logistics & decision fatigue", icon: "brain" },

        options: [
          { text: '"Just take a bath and do yoga."', sub: "Needs real solutions, not platitudes", icon: "bath" },
          { text: '"Take a generic supplement."', sub: "Needs targeted, quality products", icon: "leaf" },
          { text: '"You just need to sleep."', sub: "Needs clinical support", icon: "bed" },
          { text: '"Just hire some help."', sub: "Needs vetted, affordable resources", icon: "hand" },
        ],
      },
      {
        label: "The Action Tier",
        question: "What's your realistic monthly wellness budget?",
        options: [
          { text: "Under $50", sub: "High-impact stacks & DIY tools", icon: "dollar" },
          { text: "$50 – $150", sub: "Premium wellness & memberships", icon: "gem" },
          { text: "$150+", sub: "Specialist booking & telehealth", icon: "crown" },

      },
    ];

    const TIER_NAMES = ["Essentials", "Premium", "Specialist"];
    const TIER_KEYS = ["essentials", "premium", "specialist"];
    const TIER_BUDGETS = ["Under $50/month", "$50–$150/month", "$150+/month"];

    const LOADING_MSGS = [
      "Analyzing your responses...",
      "Mapping your wellness priorities...",
      "Selecting vetted products for your budget...",
      "Building your personalized protocol...",
      "Finalizing your Vital Plan...",
    ];

    // ─── ICONS ───
    const ICONS = {
      brain: `<path d="M12 2a4 4 0 0 1 4 4v1a3 3 0 0 1 2 2.83V11a4 4 0 0 1-1.5 3.12A3.5 3.5 0 0 1 13 18h-2a3.5 3.5 0 0 1-3.5-3.88A4 4 0 0 1 6 11V9.83A3 3 0 0 1 8 7V6a4 4 0 0 1 4-4z"/><path d="M12 2v20"/>`,

      dollar: `<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>`,

    function icon(name, size = 18, color = "currentColor") {
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ""}</svg>`;
    }

    // ─── PLAN GENERATION ───
    function getProductsForProfile(answers) {
      const tier = TIER_KEYS[answers[4] ?? 0];
      const needIdx = answers[0] ?? 0;
      const careIdx = answers[1] ?? 0;
      const hormonalIdx = answers[2] ?? 0;

      let cats = ["supplements"];
      if (needIdx === 0 || needIdx === 3) cats.push("stress");
      if (needIdx === 1 || needIdx === 3) cats.push("sleep");
      if (needIdx === 2 || needIdx === 3) cats.push("stress");
      if (hormonalIdx <= 2) cats.push("hormonal");
      if (careIdx <= 3) cats.push("caregiver");

      cats = [...new Set(cats)];
      const selected = [];
      for (const cat of cats) {
        const items = PRODUCTS[cat]?.[tier] || [];
        selected.push(...items.map(p => ({ ...p, category: cat })));
      }
      return selected;
    }

    async function generatePlan(answers) {
      if (!API_KEY) throw new Error("no-key");

      const profile = QUIZ.map((step, i) => ({
        category: step.label,
        answer: step.options[answers[i]]?.text || "Not answered",
        detail: step.options[answers[i]]?.sub || null,
      }));

      const tierIdx = answers[4] ?? 0;
      const tierName = TIER_NAMES[tierIdx];
      const tierBudget = TIER_BUDGETS[tierIdx];
      const products = getProductsForProfile(answers);

      const productList = products.map(p =>
        `- [${p.category}] ${p.name} (${p.price}) — ${p.why}`
      ).join("\n");

      const prompt = `You are a compassionate wellness expert at StayVital Collection, helping women in the "sandwich generation" build personalized wellness protocols.

A woman just completed our quiz. Generate her personalized Vital Plan.

Her Responses:
${profile.map(p => `- ${p.category}: ${p.answer}${p.detail ? ` (${p.detail})` : ""}`).join("\n")}

Protocol Tier: ${tierName} (${tierBudget})

Available Vetted Products (select the 4-6 most relevant for her situation):
${productList}

Return ONLY valid JSON (no markdown fences) with this structure:
{
  "planTitle": "Short personalized title (e.g. 'The Caregiver Reset Protocol')",
  "summary": "2-3 warm sentences reflecting where she is, referencing her specific answers",
  "focusAreas": [
    { "title": "3-5 word title", "description": "1-2 actionable sentences" }
  ],
  "weeklyProtocol": [
    { "time": "Morning|Midday|Evening|Daily|Weekly", "action": "Specific action", "detail": "Why this matters for her" }
  ],
  "recommendedProducts": [
    { "name": "Exact product name from the list above", "category": "category from list", "personalNote": "1 sentence on why this specifically fits her" }
  ],
  "nextStep": "One specific action she can do today"
}

Rules:
- 2-3 focus areas, 4-5 protocol items, 4-6 products from the provided list
- ONLY recommend products from the provided list — use exact names
- Be warm and real, like a knowledgeable friend
- Reference her specific answers throughout
- No emojis, no medical jargon`;

      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1200,
          messages: [{ role: "user", content: prompt }],
        }),
      });

      if (!res.ok) throw new Error(`API ${res.status}`);
      const data = await res.json();
      return JSON.parse(data.content[0].text);
    }

    // ─── APP STATE ───
    let state = {
      step: 0,
      answers: [],
      done: false,
      loading: false,
      loadingMsg: 0,
      plan: null,
      error: null,
      copied: false,
    };

    let loadingTimer = null;

    function setState(updates) {
      Object.assign(state, updates);
      render();
    }

    function selectAnswer(idx) {
      const answers = [...state.answers];
      answers[state.step] = idx;
      setState({ answers });

      setTimeout(() => {
        if (state.step < QUIZ.length - 1) {
          setState({ step: state.step + 1 });
        } else {
          setState({ done: true, loading: true, loadingMsg: 0 });
          loadingTimer = setInterval(() => {
            setState({ loadingMsg: (state.loadingMsg + 1) % LOADING_MSGS.length });
          }, 1800);
          generatePlan(answers)
            .then(plan => {
              clearInterval(loadingTimer);
              setState({ plan, loading: false });
              document.getElementById("app").scrollIntoView({ behavior: "smooth" });
            })
            .catch(err => {
              clearInterval(loadingTimer);
              setState({ error: err.message, loading: false });
            });
        }
      }, 350);
    }

    function goBack() {
      if (state.step > 0) setState({ step: state.step - 1 });
    }

    function resetQuiz() {
      clearInterval(loadingTimer);
      state = { step: 0, answers: [], done: false, loading: false, loadingMsg: 0, plan: null, error: null, copied: false };
      render();
    }

    function copyPlan() {
      const p = state.plan;
      if (!p) return;
      const tierIdx = state.answers[4] ?? 0;
      const products = getProductsForProfile(state.answers);
      const text = [
        `${p.planTitle || "Your Vital Plan"} — ${TIER_NAMES[tierIdx]} Protocol`,
        `StayVital Collection`,
        "",
        p.summary,
        "",
        "PRIORITY FOCUS AREAS",
        ...(p.focusAreas || []).map((a, i) => `${i + 1}. ${a.title}: ${a.description}`),
        "",
        "YOUR WEEKLY PROTOCOL",
        ...(p.weeklyProtocol || []).map(r => `[${r.time}] ${r.action} — ${r.detail}`),
        "",
        "RECOMMENDED PRODUCTS",
        ...(p.recommendedProducts || []).map(r => {
          const match = products.find(x => x.name === r.name);
          return `- ${r.name}${match ? ` (${match.price}) — ${match.link}` : ""}\n  ${r.personalNote}`;
        }),
        "",
        "YOUR NEXT STEP",
        p.nextStep,
      ].join("\n");
      navigator.clipboard.writeText(text).then(() => {
        setState({ copied: true });
        setTimeout(() => setState({ copied: false }), 2500);
      });
    }

    // ─── RENDER ───
    function render() {
      const el = document.getElementById("app");
      if (!el) return;

      // QUIZ QUESTIONS
      if (!state.done) {
        const q = QUIZ[state.step];
        const progress = ((state.step) / QUIZ.length) * 100;

        el.innerHTML = `
          <div class="bg-cream rounded-2xl shadow-xl overflow-hidden fade-in" style="box-shadow: 0 20px 60px rgba(0,0,0,0.08);">
            <!-- Progress -->
            <div class="h-1 bg-ink/5">
              <div class="h-full bg-gold transition-all duration-500 rounded-r-full" style="width:${progress}%"></div>
            </div>

            <div class="p-6 md:p-8">
              <div class="flex items-center justify-between mb-5">
                <span class="text-xs tracking-widest uppercase text-gold font-medium" style="letter-spacing:3px">${q.label}</span>
                <span class="text-xs text-ink/40">${state.step + 1} of ${QUIZ.length}</span>
              </div>

              <h2 class="font-serif text-lg md:text-xl font-medium mb-6 leading-snug">${q.question}</h2>

              <div class="space-y-2.5">
                ${q.options.map((opt, i) => {
                  const sel = state.answers[state.step] === i;
                  return `
                    <button onclick="selectAnswer(${i})"
                      class="w-full flex items-center gap-3 p-3.5 rounded-xl text-left transition-all duration-200 border ${sel ? "border-gold bg-gold/10" : "border-ink/5 hover:border-gold/25 hover:bg-gold/[0.03]"} fade-in delay-${i}"
                    >
                      <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 ${sel ? "bg-gold/15" : "bg-ink/5"}">
                        ${icon(opt.icon, 16, sel ? "#C89B3C" : "rgba(26,26,26,0.4)")}
                      </div>
                      <div class="flex-1 min-w-0">
                        <span class="text-sm font-medium block text-ink">${opt.text}</span>
                        ${opt.sub ? `<span class="text-xs block mt-0.5 text-ink/40 font-light">${opt.sub}</span>` : ""}
                      </div>
                      ${sel ? `<div class="flex-shrink-0">${icon("check", 16, "#C89B3C")}</div>` : ""}
                    </button>
                  `;
                }).join("")}
              </div>

              ${state.step > 0 ? `
                <button onclick="goBack()" class="flex items-center gap-1 mt-5 text-xs text-ink/40 hover:text-ink/60 transition-colors">
                  ${icon("back", 14)} Back
                </button>
              ` : ""}
            </div>
          </div>
        `;
        return;
      }

      // LOADING
      if (state.loading) {
        el.innerHTML = `
          <div class="bg-cream rounded-2xl shadow-xl p-8 md:p-10 text-center fade-in" style="box-shadow: 0 20px 60px rgba(0,0,0,0.08);">
            <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 bg-gold/10" style="animation: pulse 1.8s ease-in-out infinite;">
              ${icon("sparkles", 28, "#C89B3C")}
            </div>
            <h3 class="font-serif text-xl md:text-2xl font-medium mb-3">Generating Your Vital Plan</h3>
            <p class="text-sm text-ink/50 font-light max-w-xs mx-auto" style="min-height:40px;transition:opacity 0.4s">
              ${LOADING_MSGS[state.loadingMsg]}
            </p>
            <div class="mt-6 flex justify-center gap-1.5">
              ${[0,1,2].map(i => `<div class="w-2 h-2 rounded-full bg-gold" style="animation:dot 1.2s ease-in-out ${i*0.2}s infinite"></div>`).join("")}
            </div>
          </div>
        `;
        return;
      }

      // ERROR
      if (state.error) {
        const tierIdx = state.answers[4] ?? 0;
        const isNoKey = state.error === "no-key";
        el.innerHTML = `
          <div class="bg-cream rounded-2xl shadow-xl p-8 md:p-10 text-center fade-in" style="box-shadow: 0 20px 60px rgba(0,0,0,0.08);">
            <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-5 ${isNoKey ? "bg-sage/10" : "bg-gold/10"}">
              ${icon(isNoKey ? "shield" : "sparkles", 24, isNoKey ? "#7C8C6E" : "#C89B3C")}
            </div>
            <h3 class="font-serif text-xl font-medium mb-2">${isNoKey ? "API Key Required" : "Something went wrong"}</h3>
            <p class="text-sm text-ink/50 font-light mb-6 max-w-xs mx-auto">
              ${isNoKey
                ? "Set your Anthropic API key in quiz.html to generate personalized AI plans."
                : "We couldn't reach the AI right now. Please try again."
              }
            </p>
            ${isNoKey ? `
              <div class="rounded-lg p-3 mb-6 bg-creamLight border border-ink/5 text-left">
                <p class="text-xs font-medium text-ink mb-1">In quiz.html, set:</p>
                <code class="text-xs text-teal">const API_KEY = "sk-ant-..."</code>
              </div>
            ` : ""}
            <button onclick="resetQuiz()" class="inline-flex items-center gap-2 px-6 py-3 rounded-full text-sm font-medium bg-gold text-cream hover:bg-teal transition-colors">
              ${icon("refresh", 16, "#F5F2EB")} Try Again
            </button>
          </div>
        `;
        return;
      }

      // PLAN RESULTS
      if (state.plan) {
        const p = state.plan;
        const tierIdx = state.answers[4] ?? 0;
        const products = getProductsForProfile(state.answers);

        el.innerHTML = `
          <div class="bg-cream rounded-2xl shadow-xl overflow-hidden fade-in" style="box-shadow: 0 20px 60px rgba(0,0,0,0.08);">
            <div class="p-6 md:p-8">

              <!-- Header -->
              <div class="text-center mb-6">
                <div class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 bg-gold/10">
                  ${icon("sparkles", 22, "#C89B3C")}
                </div>
                <span class="inline-block px-3 py-1 rounded-full bg-gold/10 text-xs tracking-widest uppercase font-medium text-gold mb-2" style="letter-spacing:2px">
                  ${TIER_NAMES[tierIdx]} Protocol
                </span>
                <h2 class="font-serif text-xl md:text-2xl font-medium leading-tight">${p.planTitle || "Your Vital Plan"}</h2>
              </div>

              <!-- Summary -->
              <div class="rounded-xl p-4 mb-5 bg-warmWhite border border-gold/20">
                <p class="text-sm text-ink font-light leading-relaxed">${p.summary}</p>
              </div>

              <!-- Focus Areas -->
              <div class="mb-5">
                <h4 class="text-xs tracking-widest uppercase text-gold font-medium flex items-center gap-2 mb-3" style="letter-spacing:3px">
                  ${icon("star", 12, "#C89B3C")} Priority Focus Areas
                </h4>
                <div class="space-y-2">
                  ${(p.focusAreas || []).map((a, i) => `
                    <div class="flex gap-3 p-3 rounded-lg bg-creamLight">
                      <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 bg-gold/10">
                        <span class="text-xs font-medium text-gold">${i + 1}</span>
                      </div>
                      <div>
                        <p class="text-sm font-medium text-ink">${a.title}</p>
                        <p class="text-xs mt-0.5 text-ink/50 font-light leading-relaxed">${a.description}</p>
                      </div>
                    </div>
                  `).join("")}
                </div>
              </div>

              <!-- Weekly Protocol -->
              <div class="mb-5">
                <h4 class="text-xs tracking-widest uppercase text-gold font-medium flex items-center gap-2 mb-3" style="letter-spacing:3px">
                  ${icon("file", 12, "#C89B3C")} Your Weekly Protocol
                </h4>
                <div class="space-y-2">
                  ${(p.weeklyProtocol || []).map(r => `
                    <div class="flex gap-3 p-3 rounded-lg border border-ink/5">
                      <span class="inline-block px-2 py-0.5 rounded text-[10px] tracking-wider uppercase font-medium bg-gold/10 text-gold self-start mt-0.5 whitespace-nowrap">${r.time}</span>
                      <div class="flex-1">
                        <p class="text-sm font-medium text-ink">${r.action}</p>
                        <p class="text-xs mt-0.5 text-ink/50 font-light leading-relaxed">${r.detail}</p>
                      </div>
                    </div>
                  `).join("")}
                </div>
              </div>

              <!-- Recommended Products with Links -->
              <div class="mb-5">
                <h4 class="text-xs tracking-widest uppercase text-gold font-medium flex items-center gap-2 mb-3" style="letter-spacing:3px">
                  ${icon("bag", 12, "#C89B3C")} Vetted Products For You
                </h4>
                <div class="space-y-2">
                  ${(p.recommendedProducts || []).map(r => {
                    const match = products.find(x => x.name === r.name);
                    return `
                      <div class="p-3 rounded-lg bg-creamLight border border-ink/5">
                        <div class="flex items-start justify-between gap-2 mb-1">
                          <p class="text-sm font-medium text-ink">${r.name}</p>
                          ${match ? `<span class="text-xs font-medium text-gold whitespace-nowrap">${match.price}</span>` : ""}
                        </div>
                        <p class="text-xs text-ink/50 font-light leading-relaxed mb-2">${r.personalNote}</p>
                        ${match ? `
                          <a href="${match.link}" target="_blank" rel="noopener noreferrer"
                            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-teal text-cream hover:bg-gold transition-colors no-underline">
                            ${icon("link", 12, "#F5F2EB")} View Product
                          </a>
                        ` : ""}
                      </div>
                    `;
                  }).join("")}
                </div>
              </div>

              <!-- Next Step -->
              <div class="rounded-xl p-4 mb-6 bg-inkDeep">
                <h4 class="text-xs tracking-widest uppercase text-gold font-medium flex items-center gap-2 mb-2" style="letter-spacing:3px">
                  ${icon("arrow", 12, "#C89B3C")} Your Next Step
                </h4>
                <p class="text-sm text-creamLight font-light leading-relaxed">${p.nextStep}</p>
              </div>

              <!-- Action Buttons -->
              <div class="space-y-2.5 mb-4">
                <button onclick="window.location.href='index.html'" class="w-full flex items-center justify-center gap-3 px-6 py-4 rounded-xl text-sm font-medium bg-gold text-cream hover:bg-teal transition-colors">
                  ${icon("bag", 18, "#F5F2EB")} Start My Protocol
                </button>
              </div>

              <!-- Copy & Email -->
              <div class="flex gap-2 mb-4">
                <button onclick="copyPlan()"
                  class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-xs font-medium bg-creamLight border border-ink/5 hover:border-gold/25 transition-colors ${state.copied ? "text-sage" : "text-ink/50"}">
                  ${state.copied ? icon("check", 14, "#7C8C6E") : icon("copy", 14)} ${state.copied ? "Copied!" : "Copy Plan"}
                </button>
                <a href="mailto:?subject=My StayVital Vital Plan&body=${encodeURIComponent((() => {
                  const text = [
                    p.planTitle || "Your Vital Plan",
                    p.summary, "",
                    "PROTOCOL:",
                    ...(p.weeklyProtocol||[]).map(r=>`[${r.time}] ${r.action}`), "",
                    "PRODUCTS:",
                    ...(p.recommendedProducts||[]).map(r => {
                      const m = products.find(x=>x.name===r.name);
                      return `- ${r.name}${m?" — "+m.link:""}`;
                    }),
                  ].join("\n");
                  return text;
                })())}"
                  class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-xs font-medium bg-creamLight border border-ink/5 hover:border-gold/25 transition-colors text-ink/50 no-underline">
                  ${icon("download", 14)} Email Plan
                </a>
              </div>

              <div class="text-center">
                <button onclick="resetQuiz()" class="text-xs text-ink/40 underline hover:text-ink/60 transition-colors">Retake quiz</button>
              </div>
            </div>
          </div>
        `;
        return;
      }
    }

    // ─── INIT ───
    document.addEventListener("DOMContentLoaded", render);
  </script>
</body>
</html>
